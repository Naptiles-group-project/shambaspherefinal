<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
{% load static %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyer Registration - ShambaSphere</title>
<link rel="stylesheet" href="{% static 'css/buyer-register.css' %}">
</head>
<body>

<div class="form-wrapper">

    <div class="form-panel">
        <h2>Create Buyer Account</h2>

        <form id="buyerRegisterForm" method="POST" action="{% url 'buyer_register' %}">
        {% csrf_token %}

            <!-- Profile Upload -->
            <div class="profile-upload">
                <img id="profilePreview" src="{% static 'images/default-profile.png' %}" alt="Profile">
                <input type="file" id="profileImage" name="profileImage" accept="image/*">
            </div>

            <div class="row">
                <input type="text" id="firstName" name="firstName"  placeholder="First Name" required>
                <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
            </div>

            <input type="text" id="username" placeholder="Username" name="username" required>
            <input type="tel" id="phone" placeholder="Phone Number (07XXXXXXXX)" name="phone" required>

            <div class="row">
                <input type="email" id="email" name="email"  placeholder="Email" required>
                <input type="email" id="confirmEmail" name="confirmEmail" placeholder="Confirm Email" required>
            </div>

            <select id="county" name="county" required>
                <option value="">Select County</option>
            </select>

            <input type="text" id="address" name="address"   placeholder="Physical Address" required>

            <div class="row">
                <input type="date" id="dob" name="dob" required>
                <select id="gender" name="gender"  required>
                    <option value="">Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Prefer not to say</option>
                </select>
            </div>

            <div class="password-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword('password')">👁</span>
            </div>

            <div id="strengthMessage"></div>

            <div class="password-group">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁</span>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" name="terms" required  >
                <label for="terms">I agree to Terms & Conditions</label>
            </div>

            <button type="submit">Register</button>

            <p id="message"></p>

        </form>
    </div>

</div>

<script src="{% static 'js/buyer-register.js' %}"></script>
</body>
</html>
