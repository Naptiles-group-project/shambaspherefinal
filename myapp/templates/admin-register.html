<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Register - ShambaSphere</title>
<link rel="stylesheet" href="admin-register.css">
</head>
<body>

<div class="container">
    <h1>Admin Registration</h1>
    <!-- Profile Display -->
<div class="profile-display" id="profileDisplay">
    <img id="profileImage" src="https://via.placeholder.com/100" alt="Profile">
    <div>
        <h3 id="profileName">Admin Name</h3>
        <p id="profileRole">Role</p>
    </div>
</div>

    <form id="adminForm">
    

        <!-- Personal Info -->
        <section>
            <h2>Personal Information</h2>
            <div class="grid">
                <input type="text" placeholder="First Name" required>
                <input type="text" placeholder="Last Name" required>
                <input type="text" placeholder="Username" required>
                <input type="email" id="email" placeholder="Official Email" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="file" id="profileUpload" accept="image/*">
            </div>
        </section>

        <!-- Role Level -->
        <section>
            <h2>Admin Role</h2>
            <select required>
                <option value="">Select Role Level</option>
                <option>Super Admin</option>
                <option>Marketplace Manager</option>
                <option>Content Manager</option>
                <option>Support Officer</option>
            </select>
        </section>

        <!-- Institution Details -->
        <section>
            <h2>Institution Details</h2>
            <div class="grid">
                <input type="text" placeholder="Institution Name" required>
                <input type="text" placeholder="Department" required>
                <input type="text" placeholder="Office Location" required>
                <input type="text" placeholder="Staff ID" required>
            </div>
        </section>

        <!-- Security -->
        <section>
            <h2>Security</h2>
            <input type="password" id="password" placeholder="Password" required>
            <div class="strength-meter">
                <div id="strengthBar"></div>
            </div>

            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <select required>
                <option value="">Select Security Question</option>
                <option>What is your favorite crop?</option>
                <option>What is your childhood nickname?</option>
                <option>What is your mother's maiden name?</option>
            </select>

            <input type="text" placeholder="Security Answer" required>

            <label class="terms">
                <input type="checkbox" required>
                I agree to Admin Terms & Conditions
            </label>
        </section>

        <button type="submit" class="submit-btn">Register Admin</button>

    </form>
</div>

<script src="admin-register.js"></script>
</body>
</html>
